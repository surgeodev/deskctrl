name: Build & Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Build .deb (Linux)
  # ──────────────────────────────────────────────────────────────────
  deb:
    runs-on: ubuntu-latest
    outputs:
      filename: ${{ steps.package.outputs.filename }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build .deb package
        id: package
        run: |
          chmod +x scripts/pkg-build.sh
          ./scripts/pkg-build.sh
          echo "filename=$(ls dist/*.deb | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deskctrl-linux-deb
          path: dist/*.deb

  # ──────────────────────────────────────────────────────────────────
  # Build .exe (Windows)
  # ──────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --console --name deskctrl `
            --icon deskctrl.ico `
            --add-data "deskctrl;deskctrl" `
            --hidden-import PyQt6 `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtNetwork `
            --hidden-import pynput.keyboard._win32 `
            --hidden-import pynput.mouse._win32 `
            --hidden-import mss.windows `
            --hidden-import zeroconf `
            run.py

      - name: Create zip
        run: |
          Compress-Archive -Path dist/deskctrl.exe -DestinationPath dist/deskctrl-windows-x64.zip

      - name: Build InnoSetup installer
        run: |
          choco install innosetup --no-progress
          copy dist\deskctrl.exe scripts\
          copy deskctrl.ico scripts\
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "${{ inputs.version }}" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" scripts\setup.iss
          move scripts\deskctrl-setup-*.exe dist\
          del scripts\deskctrl.exe
          del scripts\deskctrl.ico

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskctrl-windows-exe
          path: |
            dist/deskctrl-windows-x64.zip
            dist/deskctrl-setup-*.exe

  # ──────────────────────────────────────────────────────────────────
  # Build macOS universal binary
  # ──────────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build macOS .app bundle
        run: |
          pyinstaller --onefile --windowed --name deskctrl \
            --icon deskctrl.png \
            --add-data "deskctrl:deskctrl" \
            --hidden-import PyQt6 \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtNetwork \
            --hidden-import pynput.keyboard._darwin \
            --hidden-import pynput.mouse._darwin \
            --hidden-import mss.darwin \
            --hidden-import zeroconf \
            run.py

      - name: Create tar.gz
        run: |
          cd dist && tar czf deskctrl-macos-x64.tar.gz deskctrl

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: deskctrl-macos
          path: dist/deskctrl-macos-x64.tar.gz

  # ──────────────────────────────────────────────────────────────────
  # Create GitHub Release (after all builds complete)
  # ──────────────────────────────────────────────────────────────────
  release:
    needs: [deb, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _release/

      - name: Gather release files
        run: |
          mkdir -p release-files
          cp _release/deskctrl-linux-deb/*.deb release-files/ 2>/dev/null || true
          cp _release/deskctrl-windows-exe/*.zip release-files/ 2>/dev/null || true
          cp _release/deskctrl-windows-exe/*.exe release-files/ 2>/dev/null || true
          cp _release/deskctrl-macos/*.tar.gz release-files/ 2>/dev/null || true
          # Also include install scripts
          cp scripts/install.sh release-files/
          cp scripts/install.ps1 release-files/
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: deskctrl ${{ github.ref_name || format('v{0}', inputs.version) }}
          body: |
            ## deskctrl ${{ github.ref_name || format('v{0}', inputs.version) }}

            ### Downloads

            | Platform | Download | Install |
            |----------|----------|---------|
            | Linux | .deb | curl + install.sh |
            | Windows | .exe (zip) | install.ps1 |
            | macOS | tar.gz | curl + install.sh |

            ### Quick install

            ```
            # Linux / macOS
            curl -sSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash

            # Windows (PowerShell)
            iwr -useb https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            ### New in this release
            - `deskctrl extend HOST:PORT` — extended display mode (side panel, no grab)
            - `deskctrl serve --monitor N` — capture a specific monitor (e.g. virtual display)
            - `deskctrl serve --virtual` — auto-create virtual monitor (Windows)
            - `deskctrl driver` — subcommands to install/manage virtual display driver
            - Server detects monitor-mode clients, skips video streaming
            - Fix: monitor mode no longer blocks on TCP buffer fill
            - Fix: KEYUP sends local keys to server (local key filter)
            - Fix: fullscreen toggle changed to Alt+F (plain F sent to remote)
            - Module-level pygame key helpers shared between display modes
          files: release-files/*
